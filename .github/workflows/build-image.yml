name: Build & push gen3-portal image

# Builds ghcr.io/se4bio/gen3-portal from Dockerfile.production.
# GITHUB_TOKEN is passed as a BuildKit secret so the build stage can pull
# @se4bio/trial-matcher-app from GitHub Packages (see Dockerfile comment).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gen3-portal
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHCR_READ_TOKEN is a PAT with `read:packages` scope for the
          # se4bio org — the auto GITHUB_TOKEN is scoped per-repo and
          # can't pull packages published by another org/account.
          secrets: |
            github_token=${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Tell ctm-gen3-config a new :main digest is live so it can rollout
      # the frontend-framework deployment. Closes the last manual step in
      # the FE→portal release chain (see ctm-gen3-config CLAUDE.md
      # "Release / version-bump policy").
      - name: Notify ctm-gen3-config to rollout
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          curl -sfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CONFIG_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/se4bio/gen3-config/dispatches \
            -d '{"event_type":"portal-image-pushed","client_payload":{"sha":"${{ github.sha }}"}}'
